version: "3.8"

services:
    shortener-redis:
        image: redis:7-alpine
        container_name: shortener-redis
        ports:
            - "6379:6379"
        command: redis-server --appendonly yes
        volumes:
            - redis_data:/data
        networks:
            - shortener-network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5

volumes:
    redis_data:

networks:
    shortener-network:
        driver: bridge
