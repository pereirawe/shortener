
services:
    shortener-redis:
        image: redis:7-alpine
        container_name: shortener-redis
        ports:
            - "6379:6379"
        command: redis-server --appendonly yes
        volumes:
            - redis_data:/data
        networks:
            - shortener-network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5

    shortener-postgres:
        image: postgres:15-alpine
        container_name: shortener-postgres
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-shortener_user}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shortener_password}
            POSTGRES_DB: ${POSTGRES_DB:-shortener_db}
        ports:
            - "5433:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - shortener-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 3s
            retries: 5

volumes:
    redis_data:
    postgres_data:

networks:
    shortener-network:
        driver: bridge
